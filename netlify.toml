[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ============================================================
# REDIRECTS
# ============================================================

# Payment / API webhooks → serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# ============================================================
# CLEAN URLS — professional routes without .html
# status 200 = rewrite (URL stays clean, serves the .html file)
# ============================================================

