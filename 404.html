<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>404 &mdash; Saliste de la &oacute;rbita | Orbita Capital</title>
  <link rel="icon" href="assets/img/branding/orbita-logo-symbol.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #060a13;
      --color-surface: #0d1320;
      --color-border: rgba(255,255,255,0.06);
      --color-text: #eaf0f9;
      --color-text-muted: #8b95a8;
      --color-text-dim: #5a6478;
      --color-primary: #3b82f6;
      --color-secondary: #8b5cf6;
      --color-accent: #06b6d4;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: 'Poppins', -apple-system, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }

    body::before {
      top: -15%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: rgba(59, 130, 246, 0.07);
      animation: float-orb 12s ease-in-out infinite;
    }

    body::after {
      bottom: -15%;
      right: -10%;
      width: 450px;
      height: 450px;
      background: rgba(139, 92, 246, 0.06);
      animation: float-orb 15s ease-in-out infinite reverse;
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    /* Subtle grid pattern */
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      position: relative;
      max-width: 520px;
      width: 100%;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      margin-bottom: 2.5rem;
      text-decoration: none;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.05s forwards;
    }
    .logo img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }
    .logo-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.01em;
    }

    /* 404 code */
    .error-code {
      font-size: clamp(6rem, 22vw, 10rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.06em;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 40%, #06b6d4 80%, #22c55e 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.15s forwards, gradient-shift 6s ease infinite;
      position: relative;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.15;
      filter: blur(12px);
      pointer-events: none;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Orbit ring decoration */
    .orbit-ring {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.25s forwards;
    }

    .orbit-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(59, 130, 246, 0.15);
      animation: spin-slow 8s linear infinite;
    }

    .orbit-ring::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-primary);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
      animation: spin-slow 8s linear infinite;
      transform-origin: 4px 44px;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .orbit-ring svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      color: var(--color-text-dim);
    }

    .error-title {
      font-size: clamp(1.2rem, 3.5vw, 1.6rem);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.35s forwards;
    }

    .error-desc {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.45s forwards;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      border: none;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff;
      box-shadow: 0 2px 16px rgba(59, 130, 246, 0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(59, 130, 246, 0.45);
      color: #fff;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--color-text-muted);
    }
    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--color-text);
      transform: translateY(-1px);
    }

    /* Footer */
    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.72rem;
      color: var(--color-text-dim);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.65s forwards;
    }
    .footer-note a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .footer-note a:hover {
      color: var(--color-accent);
      text-decoration: underline;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .error-code, .orbit-ring, .logo, .error-title,
      .error-desc, .btn-group, .footer-note {
        opacity: 1 !important;
        transform: none !important;
      }
    }

    @media (max-width: 480px) {
      body { padding: 1.5rem; }
      .btn { padding: 0.65rem 1.25rem; font-size: 0.8rem; }
      .orbit-ring { width: 64px; height: 64px; }
      .orbit-ring::after { transform-origin: 4px 36px; }
      .orbit-ring svg { width: 26px; height: 26px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="container">
    <a href="/" class="logo">
      <img src="assets/img/branding/orbita-logo-symbol.png" alt="Orbita Capital" width="36" height="36">
      <span class="logo-name">Orbita Capital</span>
    </a>

    <div class="error-code">404</div>

    <div class="orbit-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
      </svg>
    </div>

    <h1 class="error-title">Saliste de la &oacute;rbita</h1>
    <p class="error-desc">
      La p&aacute;gina que busc&aacute;s no existe o cambi&oacute; de ubicaci&oacute;n.<br>
      Pero pod&eacute;s volver al centro de control.
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Volver al inicio
      </a>
      <a href="/academia" class="btn btn-ghost">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        Explorar la academia
      </a>
    </div>

    <p class="footer-note">
      &iquest;Ten&eacute;s una cuenta?
      <a href="/login">Inici&aacute; sesi&oacute;n</a>
      &nbsp;&middot;&nbsp;
      &iquest;Necesit&aacute;s ayuda?
      <a href="https://instagram.com/orbitacapital.io" target="_blank" rel="noopener">Soporte</a>
    </p>
  </div>
</body>
</html>
