# ============================================================
# SECURITY HEADERS — applied to all routes
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Clickjacking protection
    X-Frame-Options = "DENY"
    # MIME sniffing protection
    X-Content-Type-Options = "nosniff"
    # Legacy XSS filter
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unnecessary browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Enforce HTTPS for 2 years (no preload until domain is submitted)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
    # Content Security Policy
    # - script-src: self + inline scripts (existing codebase) + CDN (Supabase, Stripe, MercadoPago)
    # - style-src: self + inline styles + Google Fonts
    # - connect-src: Supabase REST + Realtime (wss) + Stripe + MercadoPago
    # - frame-src: Stripe payment iframes only
    # - object-src / base-uri: locked down
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com https://sdk.mercadopago.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://api.mercadopago.com; img-src 'self' data: blob: https:; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self';"

# ============================================================
# CACHE HEADERS
# ============================================================

# No cache for HTML — auth/role changes take effect immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Long-term cache for versioned static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
